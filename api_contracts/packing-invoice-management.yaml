openapi: 3.0.3

info:
  title: Packing Invoice Management API
  version: 1.0.0
  description: OpenAPI for Packing Invoice management

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: http://3.7.63.123:8080
    description: Development Server
  - url: http://13.205.54.102:8080
    description: Production Server

tags:
  - name: PackingInvoice
    description: Packing Invoice Endpoints

security:
  - oauth2: [ ]

paths:
  # -------------------- PACKING INVOICE --------------------
  /api/v1/packing-invoices:
    get:
      operationId: getAllPackingInvoices
      tags:
        - PackingInvoice
      summary: Get all packing invoices (paginated, filterable by party and month)
      parameters:
        - name: partyId
          in: query
          description: Filter by party ID
          schema:
            type: integer
            format: int64
        - name: month
          in: query
          description: Filter by month (yyyy-MM, e.g. 2026-03)
          schema:
            type: string
        - $ref: '#/components/parameters/searchParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/sizeParam'
        - $ref: '#/components/parameters/SortByFields'
        - $ref: '#/components/parameters/directionParam'
      responses:
        '200':
          description: Paginated packing invoice list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResultPackingInvoice'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      operationId: createPackingInvoice
      tags:
        - PackingInvoice
      summary: Create a packing invoice with line items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPackingInvoice'
      responses:
        '201':
          description: Packing invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackingInvoice'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/packing-invoices/{id}:
    get:
      operationId: getPackingInvoiceById
      tags:
        - PackingInvoice
      summary: Get packing invoice by ID
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Packing invoice details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackingInvoice'
        '404':
          $ref: '#/components/responses/NotFoundError'

    put:
      operationId: updatePackingInvoice
      tags:
        - PackingInvoice
      summary: Update packing invoice
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPackingInvoice'
      responses:
        '200':
          description: Packing invoice updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackingInvoice'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
      operationId: deletePackingInvoice
      tags:
        - PackingInvoice
      summary: Delete packing invoice
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '204':
          description: Packing invoice deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

components:

  securitySchemes:
    oauth2:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    idParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

    pageParam:
      name: page
      in: query
      description: Page number starting from 0
      schema:
        type: integer
        default: 0

    sizeParam:
      name: size
      in: query
      description: Number of items per page
      schema:
        type: integer
        default: 10

    directionParam:
      name: direction
      in: query
      description: Sort direction
      schema:
        type: string
        enum:
          - ASC
          - DESC

    searchParam:
      name: search
      in: query
      description: Search text to filter results
      schema:
        type: string

    SortByFields:
      name: sortByFields
      in: query
      description: Field to sort by
      schema:
        type: string
        enum:
          - lastUpdatedAt
          - createdAt
          - invoiceDate

  schemas:
    # ---- Request ----
    NewPackingInvoice:
      required:
        - partyId
        - invoiceDate
      type: object
      properties:
        invoiceDate:
          type: string
          format: date
          description: Invoice date (defaults to today)
        partyId:
          type: integer
          format: int64
          description: Party ID (from party master)
        items:
          type: array
          items:
            $ref: '#/components/schemas/NewPackingInvoiceItem'

    NewPackingInvoiceItem:
      required:
        - sizeId
      type: object
      properties:
        sizeId:
          type: integer
          format: int64
          description: Size ID from size_inventory (ItemBlueprintDataEntity)
        finish:
          type: string
          description: Finish type (e.g. S.S + 16, Z.Black, Rose Gold)
        box:
          type: number
          format: double
        pc:
          type: number
          format: double
        totalPc:
          type: number
          format: double
        scrap:
          type: number
          format: double
        laboure:
          type: number
          format: double
        rsKg:
          type: number
          format: double
        boxWeight:
          type: number
          format: double
        boxWeightAcDocWeight:
          type: number
          format: double
        billCalDocWeight:
          type: number
          format: double
        ratePc:
          type: number
          format: double
        totalRs:
          type: number
          format: double
        totalKg:
          type: number
          format: double
        asPerDocWeight:
          type: number
          format: double
        loss:
          type: number
          format: double

    # ---- Response ----
    PackingInvoice:
      type: object
      properties:
        id:
          type: integer
          format: int64
        invoiceDate:
          type: string
          format: date
        invoiceNo:
          type: string
          description: Auto-generated sequential number per party+date (01, 02…)
        party:
          $ref: '#/components/schemas/PackingInvoiceParty'
        cartoonNo:
          type: string
          description: Auto-generated cumulative number per party (01, 02…)
        items:
          type: array
          items:
            $ref: '#/components/schemas/PackingInvoiceItem'
        createdAt:
          type: string
          format: date-time
        lastUpdatedAt:
          type: string
          format: date-time

    PackingInvoiceItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        size:
          $ref: '#/components/schemas/PackingInvoiceSize'
        finish:
          type: string
        box:
          type: number
          format: double
        pc:
          type: number
          format: double
        totalPc:
          type: number
          format: double
        scrap:
          type: number
          format: double
        laboure:
          type: number
          format: double
        rsKg:
          type: number
          format: double
        boxWeight:
          type: number
          format: double
        boxWeightAcDocWeight:
          type: number
          format: double
        billCalDocWeight:
          type: number
          format: double
        ratePc:
          type: number
          format: double
        totalRs:
          type: number
          format: double
        totalKg:
          type: number
          format: double
        asPerDocWeight:
          type: number
          format: double
        loss:
          type: number
          format: double

    PackingInvoiceParty:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    PackingInvoiceSize:
      type: object
      properties:
        id:
          type: integer
          format: int64
        sizeInInch:
          type: string
        sizeInMm:
          type: string
        dozenWeight:
          type: number
          format: double

    # ---- Paginated Response ----
    PaginatedResultPackingInvoice:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PackingInvoice'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
        detail:
          type: object

  responses:
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
